name: Steiger Action
description: Run a steiger command
author: Dillen Meijboom
branding:
  icon: layers
  color: blue
inputs:
  cmd:
    description: "Command to run"
    required: true
    default: "build"
  args:
    description: "Arguments to pass to the command"
    required: false
    default: ""
  version:
    description: "Version to use"
    required: false
    default: "v0.0.7"
  builders:
    description: "Comma-separated list of builders to install dependencies for (supported: railpack)"
    required: false
    default: ""
outputs: {}
runs:
  using: "composite"
  steps:
    - uses: robinraju/release-downloader@v1
      with:
        tag: ${{ inputs.version }}
        repository: brainhivenl/steiger
        fileName: steiger-x86_64-unknown-linux-gnu
    - run: chmod +x steiger-x86_64-unknown-linux-gnu
      shell: bash
    - name: Install Railpack
      if: contains(inputs.builders, 'railpack')
      shell: bash
      run: |
        RAILPACK_VERSION=$(curl -s https://api.github.com/repos/railwayapp/railpack/releases/latest | jq -r .tag_name)
        curl -fsSL "https://github.com/railwayapp/railpack/releases/download/${RAILPACK_VERSION}/railpack-${RAILPACK_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar -xz -C /usr/local/bin railpack
    - name: Run steiger
      run: ./steiger-x86_64-unknown-linux-gnu ${{ inputs.cmd }} ${{ inputs.args }}
      shell: bash
